<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#007aff">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="apple-touch-icon" href="icon-192.png">
  
<title>1854 DKP System</title>

<style>
body {
  font-family: -apple-system, Arial;
  background:#f4f6f8;
  margin:0;
  padding:20px;
}

.container {
  max-width:500px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:16px;
}

/* New header styles */
.header-section {
  text-align: center;
  margin-bottom: 20px;
  padding-bottom: 15px;
  border-bottom: 1px solid #eee;
}

.header-section h2 {
  margin: 0 0 8px 0;
  color: #000;
}

.point-values {
  font-size: 14px;
  color: #666;
  font-weight: 500;
}

input {
  width:100%;
  padding:12px;
  margin:6px 0;
  font-size:16px;
  box-sizing: border-box;
}

button {
  width:100%;
  padding:12px;
  margin-top:6px;
  background:#007aff;
  color:white;
  border:none;
  border-radius:10px;
  cursor: pointer;
  font-size: 16px;
  font-weight: bold;
}

button:hover {
  background: #005bb5;
}

.btn-small-danger {
  background: #ff3b30;
  color: white;
  border: none;
  border-radius: 6px;
  padding: 8px 12px;
  font-size: 13px;
  cursor: pointer;
  margin-top: 10px;
  width: 100%;
  font-weight: bold;
}

.btn-small-danger:hover {
  background: #d32f2f;
}

.live {
  margin-top:10px;
  padding:10px;
  background:#eef3ff;
  border-radius:10px;
  text-align:center;
  font-weight:bold;
}

#savedDataContainer {
  margin-top: 25px;
  padding-top: 15px;
  border-top: 2px dashed #ddd;
}

#savedDataContainer h3 {
  margin-top: 0;
  font-size: 18px;
  color: #333;
}

.player-card {
  background: #fff;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 12px;
  border: 1px solid #e0e0e0;
  box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}

.player-title {
  font-size: 18px;
  font-weight: bold;
  color: #000;
  margin-bottom: 8px;
}

.progress-bg {
  background: #e0e0e0;
  border-radius: 8px;
  height: 14px;
  width: 100%;
  overflow: hidden;
  margin-bottom: 12px;
}

.progress-fill {
  background: #007aff;
  height: 100%;
  border-radius: 8px;
  transition: width 0.4s ease;
}

.log-entry {
  background: #f9f9f9;
  padding: 10px;
  margin-bottom: 6px;
  border-radius: 6px;
  border-left: 3px solid #ccc;
  font-size: 14px;
}

.log-entry:first-of-type {
  border-left: 3px solid #007aff;
}

.timestamp {
  float: right;
  font-size: 11px;
  color: #999;
}

.small {
  font-size: 13px;
  color: #666;
}
</style>
</head>

<body>

<div class="container">
  
  <div class="header-section">
    <h2>🏆 1854 DKP System 🏆</h2>
    <div class="point-values">
      T4 Kills: 2 pts &nbsp;|&nbsp; T5 Kills: 5 pts &nbsp;|&nbsp; Deads: 15 pts
    </div>
  </div>

<input id="name" placeholder="Player name">
<input id="startingPower" type="text" inputmode="numeric" placeholder="Starting Power">
<input id="t4" type="text" inputmode="numeric" placeholder="T4 kills">
<input id="t5" type="text" inputmode="numeric" placeholder="T5 kills">
<input id="deads" type="text" inputmode="numeric" placeholder="Deads">

<div class="live" id="live">
DKP: 0 | DKP %: 0%
</div>

<button onclick="savePlayer()">Save Player</button>

<div id="savedDataContainer">
  <h3>💾 Player Logs & Progress</h3>
  <div id="savedDataList"></div>
</div>

</div>

<script>

function calcDKP(p, t4, t5, d) {
  return (p * 0) + (t4 * 2) + (t5 * 5) + (d * 15);
}

function getNum(id) {
  const rawValue = document.getElementById(id).value;
  return Number(rawValue.replace(/,/g, '')) || 0;
}

function updateLive() {
  const p = getNum("startingPower");
  const t4 = getNum("t4");
  const t5 = getNum("t5");
  const d = getNum("deads");

  const dkp = calcDKP(p, t4, t5, d);
  const percent = p > 0 ? (dkp / p) * 100 : 0;

  document.getElementById("live").innerText =
    `DKP: ${dkp.toLocaleString()} | DKP %: ${percent.toFixed(2)}%`;
}

["startingPower","t4","t5","deads"].forEach(id => {
  document.getElementById(id).addEventListener("input", function(e) {
    let rawStr = this.value.replace(/,/g, "").replace(/\D/g, "");
    
    if (rawStr !== "") {
      this.value = parseInt(rawStr, 10).toLocaleString('en-US');
    } else {
      this.value = "";
    }
    
    updateLive();
  });
});

document.getElementById("name").addEventListener("input", function() {
  const currentName = this.value.trim().toLowerCase();
  let players = getSafeData();
  
  const existingPlayer = players.find(x => x.name.toLowerCase() === currentName);
  
  if (existingPlayer) {
    document.getElementById("startingPower").value = existingPlayer.startingPower.toLocaleString('en-US');
    updateLive();
  }
});

function getSafeData() {
  try {
    let data = JSON.parse(localStorage.getItem("guildLog"));
    if (!Array.isArray(data)) {
      return [];
    }
    return data;
  } catch (error) {
    return [];
  }
}

function savePlayer() {
  const name = document.getElementById("name").value.trim();
  const p = getNum("startingPower");
  const t4 = getNum("t4");
  const t5 = getNum("t5");
  const d = getNum("deads");

  if (!name) return alert("Enter player name");

  const dkp = calcDKP(p, t4, t5, d);

  let players = getSafeData();
  const currentTime = new Date().toLocaleString();

  const data = {
    name,
    startingPower: p,
    t4,
    t5,
    deads: d,
    dkp,
    timestamp: currentTime
  };

  players.unshift(data);
  localStorage.setItem("guildLog", JSON.stringify(players));

  clearInputs();
  displaySavedData();
}

function clearInputs() {
  document.getElementById("t4").value = "";
  document.getElementById("t5").value = "";
  document.getElementById("deads").value = "";
  updateLive(); 
}

function clearPlayerLogs(playerName) {
  if (confirm(`Are you sure you want to delete all logs for ${playerName}?`)) {
    let players = getSafeData();
    
    players = players.filter(p => p.name.toLowerCase() !== playerName.toLowerCase());
    
    localStorage.setItem("guildLog", JSON.stringify(players));
    
    const currentInputName = document.getElementById("name").value.trim().toLowerCase();
    if (currentInputName === playerName.toLowerCase()) {
       document.getElementById("startingPower").value = "";
       clearInputs();
    }
    
    displaySavedData();
  }
}

function displaySavedData() {
  let players = getSafeData();
  let html = "";
  
  if (players.length === 0) {
    html = "<span class='small'>No edits logged yet. Enter data above and click Save!</span>";
    document.getElementById("savedDataList").innerHTML = html;
    return;
  }

  const groupedPlayers = {};
  players.forEach(p => {
    const key = p.name.toLowerCase();
    if (!groupedPlayers[key]) {
      groupedPlayers[key] = {
        displayName: p.name,
        entries: []
      };
    }
    groupedPlayers[key].entries.push(p);
  });

  Object.values(groupedPlayers).forEach(group => {
    const latest = group.entries[0];
    const sp = latest.startingPower || 0;
    const percent = sp > 0 ? ((latest.dkp / sp) * 100).toFixed(2) : "0.00";
    const visualWidth = Math.min(parseFloat(percent), 100);

    html += `
      <div class="player-card">
        <div class="player-title">👤 ${group.displayName}</div>
        
        <div class="small" style="margin-bottom: 4px;">
          <strong>Current Progress:</strong> ${percent}%
        </div>
        <div class="progress-bg">
          <div class="progress-fill" style="width: ${visualWidth}%;"></div>
        </div>
        
        <div class="small" style="margin-bottom: 6px; font-weight: bold;">Edit History:</div>
    `;

    group.entries.forEach(entry => {
      const e_sp = entry.startingPower || 0;
      const e_percent = e_sp > 0 ? ((entry.dkp / e_sp) * 100).toFixed(2) : "0.00";
      const timeString = entry.timestamp ? entry.timestamp : "Unknown time";
      
      html += `
        <div class="log-entry">
          <span class="timestamp">${timeString}</span>
          <strong>DKP: ${(entry.dkp||0).toLocaleString()} (${e_percent}%)</strong><br>
          <span class="small">
            T4: ${(entry.t4||0).toLocaleString()} | T5: ${(entry.t5||0).toLocaleString()} | Deads: ${(entry.deads||0).toLocaleString()}
          </span>
        </div>
      `;
    });

    const safeName = group.displayName.replace(/"/g, '&quot;');
    html += `
        <button class="btn-small-danger" data-name="${safeName}" onclick="clearPlayerLogs(this.getAttribute('data-name'))">
          🗑️ Clear Logs for ${group.displayName}
        </button>
      </div>
    `;
  });
  
  document.getElementById("savedDataList").innerHTML = html;
}

displaySavedData();

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
  
</script>

</body>
</html>
