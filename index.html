<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#007aff">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="apple-touch-icon" href="icon-192.png">
  
<title>1854 DKP System</title>

<style>
body {
  font-family: -apple-system, Arial;
  background:#f4f6f8;
  margin:0;
  padding:20px;
}

.container {
  max-width:500px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:16px;
}

input {
  width:100%;
  padding:12px;
  margin:6px 0;
  font-size:16px;
  box-sizing: border-box;
}

button {
  width:100%;
  padding:12px;
  margin-top:6px;
  background:#007aff;
  color:white;
  border:none;
  border-radius:10px;
  cursor: pointer;
  font-size: 16px;
  font-weight: bold;
}

button:hover {
  background: #005bb5;
}

.btn-danger {
  background: #ff3b30;
  margin-top: 20px;
}

.btn-danger:hover {
  background: #d32f2f;
}

.live {
  margin-top:10px;
  padding:10px;
  background:#eef3ff;
  border-radius:10px;
  text-align:center;
  font-weight:bold;
}

#savedDataContainer {
  margin-top: 25px;
  padding-top: 15px;
  border-top: 2px dashed #ddd;
}

#savedDataContainer h3 {
  margin-top: 0;
  font-size: 18px;
  color: #333;
}

.saved-item {
  background: #f9f9f9;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 8px;
  border-left: 4px solid #007aff;
}

.saved-item strong {
  font-size: 16px;
  color: #000;
}

.timestamp {
  float: right;
  font-size: 11px;
  color: #999;
  font-weight: normal;
}

.small {
  font-size: 13px;
  color: #666;
  margin-top: 4px;
  display: block;
}
</style>
</head>

<body>

<div class="container">
<h2>🏆 1854 DKP System</h2>

<input id="name" placeholder="Player name">
<input id="startingPower" type="number" placeholder="Starting Power">
<input id="t4" type="number" placeholder="T4 kills">
<input id="t5" type="number" placeholder="T5 kills">
<input id="deads" type="number" placeholder="Deads">

<div class="live" id="live">
DKP: 0 | DKP %: 0%
</div>

<button onclick="savePlayer()">Save Player</button>

<div id="savedDataContainer">
  <h3>💾 Edit Log</h3>
  <div id="savedDataList"></div>
  
  <button class="btn-danger" onclick="clearAllData()">🗑️ Clear Edit Log</button>
</div>

</div>

<script>

function calcDKP(p, t4, t5, d) {
  return (p * 0) + (t4 * 2) + (t5 * 5) + (d * 15);
}

function updateLive() {
  const p = Number(document.getElementById("startingPower").value) || 0;
  const t4 = Number(document.getElementById("t4").value) || 0;
  const t5 = Number(document.getElementById("t5").value) || 0;
  const d = Number(document.getElementById("deads").value) || 0;

  const dkp = calcDKP(p, t4, t5, d);
  const percent = p > 0 ? (dkp / p) * 100 : 0;

  document.getElementById("live").innerText =
    `DKP: ${dkp.toLocaleString()} | DKP %: ${percent.toFixed(2)}%`;
}

// Update live preview when number inputs change
["startingPower","t4","t5","deads"].forEach(id => {
  document.getElementById(id).addEventListener("input", updateLive);
});

// Auto-fill Starting Power if the player name is already in the log
document.getElementById("name").addEventListener("input", function() {
  const currentName = this.value.trim().toLowerCase();
  let players = getSafeData();
  
  // Look for the most recent entry with this name
  const existingPlayer = players.find(x => x.name.toLowerCase() === currentName);
  
  if (existingPlayer) {
    document.getElementById("startingPower").value = existingPlayer.startingPower;
    updateLive();
  }
});

function getSafeData() {
  try {
    let data = JSON.parse(localStorage.getItem("guildLog"));
    if (!Array.isArray(data)) {
      return [];
    }
    return data;
  } catch (error) {
    return [];
  }
}

function savePlayer() {
  const name = document.getElementById("name").value.trim();
  const p = Number(document.getElementById("startingPower").value) || 0;
  const t4 = Number(document.getElementById("t4").value) || 0;
  const t5 = Number(document.getElementById("t5").value) || 0;
  const d = Number(document.getElementById("deads").value) || 0;

  if (!name) return alert("Enter player name");

  const dkp = calcDKP(p, t4, t5, d);

  let players = getSafeData();
  const currentTime = new Date().toLocaleString();

  const data = {
    name,
    startingPower: p,
    t4,
    t5,
    deads: d,
    dkp,
    timestamp: currentTime
  };

  players.unshift(data);
  localStorage.setItem("guildLog", JSON.stringify(players));

  clearInputs();
  displaySavedData();
}

function clearInputs() {
  // We intentionally leave "name" and "startingPower" alone so they persist
  document.getElementById("t4").value = "";
  document.getElementById("t5").value = "";
  document.getElementById("deads").value = "";
  updateLive(); // Reset the live DKP preview to 0 for the next entry
}

function displaySavedData() {
  let players = getSafeData();
  let html = "";
  
  if (players.length === 0) {
    html = "<span class='small'>No edits logged yet. Enter data above and click Save!</span>";
  } else {
    players.forEach(p => {
      const sp = p.startingPower || 0;
      const percent = sp > 0 ? ((p.dkp / sp) * 100).toFixed(2) : "0.00";
      const timeString = p.timestamp ? p.timestamp : "Unknown time";
      
      html += `
        <div class="saved-item">
          <strong>${p.name} <span class="timestamp">${timeString}</span></strong>
          <span class="small">
            Power: ${sp.toLocaleString()} | T4: ${(p.t4||0).toLocaleString()} | T5: ${(p.t5||0).toLocaleString()} | Deads: ${(p.deads||0).toLocaleString()}
            <br>
            <strong>DKP: ${(p.dkp||0).toLocaleString()} (${percent}%)</strong>
          </span>
        </div>
      `;
    });
  }
  
  document.getElementById("savedDataList").innerHTML = html;
}

function clearAllData() {
  if (confirm("Are you sure you want to delete the entire edit log? This cannot be undone.")) {
    localStorage.removeItem("guildLog");
    
    // Also clear the name and power inputs since the log is wiped
    document.getElementById("name").value = "";
    document.getElementById("startingPower").value = "";
    
    clearInputs();
    displaySavedData();
  }
}

// Initial load
displaySavedData();

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
  
</script>

</body>
</html>
