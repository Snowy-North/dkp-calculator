<script>

function calcDKP(p, t4, t5, d) {
  return (p * 0.15) + (t4 * 2) + (t5 * 5) + (d * 10);
}

// STORAGE SAFETY CHECK
function canUseStorage() {
  try {
    const test = "__test__";
    localStorage.setItem(test, "1");
    localStorage.removeItem(test);
    return true;
  } catch (e) {
    return false;
  }
}

// LIVE UPDATE
function updateLive() {
  const p = Number(document.getElementById("startingPower").value) || 0;
  const t4 = Number(document.getElementById("t4").value) || 0;
  const t5 = Number(document.getElementById("t5").value) || 0;
  const d = Number(document.getElementById("deads").value) || 0;

  const dkp = calcDKP(p, t4, t5, d);
  const percent = p > 0 ? (dkp / p) * 100 : 0;

  document.getElementById("live").innerText =
    `DKP: ${dkp.toLocaleString()} | DKP %: ${percent.toFixed(2)}%`;
}

["startingPower","t4","t5","deads"].forEach(id => {
  document.getElementById(id).addEventListener("input", updateLive);
});

// SAVE
function savePlayer() {

  if (!canUseStorage()) {
    alert("Storage is blocked (likely Private Mode). Turn off private browsing.");
    return;
  }

  const name = document.getElementById("name").value.trim();
  const newPower = Number(document.getElementById("startingPower").value) || 0;
  const t4 = Number(document.getElementById("t4").value) || 0;
  const t5 = Number(document.getElementById("t5").value) || 0;
  const d = Number(document.getElementById("deads").value) || 0;

  if (!name) return alert("Enter player name");

  let players = JSON.parse(localStorage.getItem("guild") || "[]");

  const index = players.findIndex(x => x.name.toLowerCase() === name.toLowerCase());

  let startingPower;

  if (index >= 0) {
    startingPower = players[index].startingPower;
  } else {
    if (!newPower) return alert("Enter starting power for new player");
    startingPower = newPower;
  }

  const dkp = calcDKP(startingPower, t4, t5, d);

  const data = { name, startingPower, t4, t5, deads: d, dkp };

  if (index >= 0) players[index] = data;
  else players.push(data);

  try {
    localStorage.setItem("guild", JSON.stringify(players));
  } catch (e) {
    alert("Failed to save data. Storage may be full or blocked.");
    return;
  }

  clearInputs();
  render();
}

function clearInputs() {
  document.getElementById("name").value = "";
  document.getElementById("startingPower").value = "";
  document.getElementById("t4").value = "";
  document.getElementById("t5").value = "";
  document.getElementById("deads").value = "";
  updateLive();
}

function tier(dkp) {
  if (dkp >= 100000) return "🔥 Whale";
  if (dkp >= 50000) return "Elite";
  if (dkp >= 20000) return "Veteran";
  return "Rookie";
}

function render() {
  let players = JSON.parse(localStorage.getItem("guild") || "[]");

  players.sort((a,b) => b.dkp - a.dkp);

  let html = "<h3>🏆 Leaderboard</h3>";

  players.forEach((p, i) => {

    const rank = i + 1;

    const medal =
      rank === 1 ? "🥇" :
      rank === 2 ? "🥈" :
      rank === 3 ? "🥉" :
      "#" + rank;

    const percent = p.startingPower > 0
      ? (p.dkp / p.startingPower) * 100
      : 0;

    html += `
      <div class="player">
        <div class="rank">${medal} ${p.name} (${tier(p.dkp)})</div>
        <div>DKP: ${p.dkp.toLocaleString()}</div>
        <div>DKP %: ${percent.toFixed(2)}%</div>
        <div class="small">Starting Power: ${p.startingPower}</div>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

render();

</script>
