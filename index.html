<title>1854 DKP System</title>

<style>
/* Light Mode (Default) Variables & Base Styles */
body {
  font-family: -apple-system, Arial;
  background: #f4f6f8;
  color: #333;
  margin: 0;
  padding: 20px;
  transition: background 0.3s, color 0.3s;
}

.container {
  max-width: 500px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 16px;
  transition: background 0.3s;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

/* Top Controls */
.top-controls {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  margin-bottom: 15px;
}

.theme-toggle, .lang-select {
  background: #e0e0e0;
  color: #333;
  border: none;
  border-radius: 20px;
  padding: 6px 12px;
  font-size: 13px;
  font-weight: bold;
  cursor: pointer;
  transition: background 0.3s, color 0.3s;
  outline: none;
  max-width: 200px;
}

.theme-toggle:hover, .lang-select:hover {
  background: #d0d0d0;
}

.header-section {
  text-align: center;
  margin-bottom: 20px;
  padding-bottom: 15px;
  border-bottom: 1px solid #eee;
  transition: border-color 0.3s;
}

.header-section h2 {
  margin: 0 0 8px 0;
  color: #000;
  transition: color 0.3s;
}

.point-values {
  font-size: 14px;
  color: #666;
  font-weight: 500;
  transition: color 0.3s;
}

/* Smaller text for DKP goal */
.dkp-goal {
  font-size: 12px;
  color: #888;
  margin-top: 6px;
  font-weight: normal;
  transition: color 0.3s;
}

/* Inputs & Buttons */
input {
  width: 100%;
  padding: 12px;
  margin: 6px 0;
  font-size: 16px;
  box-sizing: border-box;
  border: 1px solid #ccc;
  border-radius: 8px;
  transition: background 0.3s, color 0.3s, border-color 0.3s;
}

button.main-btn {
  width: 100%;
  padding: 12px;
  margin-top: 6px;
  background: #007aff;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: 16px;
  font-weight: bold;
}

button.main-btn:hover {
  background: #005bb5;
}

.btn-small-danger {
  background: #ff3b30;
  color: white;
  border: none;
  border-radius: 6px;
  padding: 8px 12px;
  font-size: 13px;
  cursor: pointer;
  margin-top: 10px;
  width: 100%;
  font-weight: bold;
}

.btn-small-danger:hover {
  background: #d32f2f;
}

/* Live DKP Preview */
.live {
  margin-top: 10px;
  padding: 10px;
  background: #eef3ff;
  border-radius: 10px;
  text-align: center;
  font-weight: bold;
  transition: background 0.3s, color 0.3s;
}

/* Saved Data Section */
#savedDataContainer {
  margin-top: 25px;
  padding-top: 15px;
  border-top: 2px dashed #ddd;
  transition: border-color 0.3s;
}

#savedDataContainer h3 {
  margin-top: 0;
  font-size: 18px;
  color: #333;
  transition: color 0.3s;
}

.player-card {
  background: #fff;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 12px;
  border: 1px solid #e0e0e0;
  box-shadow: 0 2px 5px rgba(0,0,0,0.05);
  transition: background 0.3s, border-color 0.3s;
}

.player-title {
  font-size: 18px;
  font-weight: bold;
  color: #000;
  margin-bottom: 8px;
  transition: color 0.3s;
}

/* Progress Bar Updates for Potato Text */
.progress-bg {
  background: #e0e0e0;
  border-radius: 8px;
  height: 20px;
  width: 100%;
  overflow: hidden;
  margin-bottom: 12px;
  position: relative; /* Required for placing text perfectly in center */
  transition: background 0.3s;
}

.progress-fill {
  background: #007aff;
  height: 100%;
  border-radius: 8px;
  transition: width 0.4s ease;
}

/* New style for the potato text */
.progress-text {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  text-align: center;
  font-size: 11px;
  font-weight: bold;
  color: white;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
  line-height: 20px;
  pointer-events: none;
}

.log-entry {
  background: #f9f9f9;
  padding: 10px;
  margin-bottom: 6px;
  border-radius: 6px;
  border-left: 3px solid #ccc;
  font-size: 14px;
  transition: background 0.3s, border-color 0.3s;
}

.log-entry:first-of-type {
  border-left: 3px solid #007aff;
}

.timestamp {
  float: right;
  font-size: 11px;
  color: #999;
}

.small {
  font-size: 13px;
  color: #666;
  transition: color 0.3s;
}

/* DARK MODE OVERRIDES */
body.dark-mode { background: #121212; color: #e0e0e0; }
body.dark-mode .container { background: #1e1e1e; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
body.dark-mode .theme-toggle, body.dark-mode .lang-select { background: #333; color: #e0e0e0; }
body.dark-mode .theme-toggle:hover, body.dark-mode .lang-select:hover { background: #444; }
body.dark-mode .header-section { border-color: #333; }
body.dark-mode .header-section h2, body.dark-mode #savedDataContainer h3, body.dark-mode .player-title { color: #fff; }
body.dark-mode .point-values, body.dark-mode .small, body.dark-mode .dkp-goal { color: #aaa; }
body.dark-mode input { background: #2d2d2d; color: #fff; border-color: #444; }
body.dark-mode input::placeholder { color: #888; }
body.dark-mode .live { background: #2a354d; color: #fff; }
body.dark-mode #savedDataContainer { border-color: #444; }
body.dark-mode .player-card { background: #252525; border-color: #333; }
body.dark-mode .progress-bg { background: #444; }
body.dark-mode .log-entry { background: #2d2d2d; border-left-color: #555; }
body.dark-mode .log-entry:first-of-type { border-left-color: #007aff; }
</style>
</head>

function changeLanguage() {
  currentLang = document.getElementById("langSelect").value;
  localStorage.setItem("lang", currentLang);
  applyTranslations();
}

  const t = i18n[currentLang];
  
  document.getElementById("mainTitle").innerHTML = t.title;
  document.getElementById("pointValues").innerHTML = t.points;
  document.getElementById("dkpGoal").innerHTML = t.dkpGoal; 
  document.getElementById("name").placeholder = t.phName;
  document.getElementById("startingPower").placeholder = t.phPower;
  document.getElementById("t4").placeholder = t.phT4;
  document.getElementById("t5").placeholder = t.phT5;
  document.getElementById("deads").placeholder = t.phDeads;
  document.getElementById("saveBtn").innerText = t.btnSave;
  document.getElementById("logsTitle").innerText = t.logTitle;
  
  displaySavedData();
}

function toggleTheme() {
  const body = document.body;
  const toggleBtn = document.getElementById("themeToggle");
  
  body.classList.toggle("dark-mode");
  
  if (body.classList.contains("dark-mode")) {
    localStorage.setItem("theme", "dark");
    toggleBtn.innerText = "☀️ Light";
  } else {
    localStorage.setItem("theme", "light");
    toggleBtn.innerText = "🌙 Dark";
  }
}

if (localStorage.getItem("theme") === "dark") {
  document.body.classList.add("dark-mode");
  document.getElementById("themeToggle").innerText = "☀️ Light";
}

function calcDKP(p, t4, t5, d) {
  return (p * 0) + (t4 * 2) + (t5 * 5) + (d * 15);
}

function getNum(id) {
  const rawValue = document.getElementById(id).value;
  return Number(rawValue.replace(/,/g, '')) || 0;
}

function updateLive() {
  const p = getNum("startingPower");
  const t4 = getNum("t4");
  const t5 = getNum("t5");
  const d = getNum("deads");

  const dkp = calcDKP(p, t4, t5, d);
  const percent = p > 0 ? (dkp / p) * 100 : 0;

  document.getElementById("live").innerText =
    `DKP: ${dkp.toLocaleString()} | DKP %: ${percent.toFixed(2)}%`;
}

["startingPower","t4","t5","deads"].forEach(id => {
  document.getElementById(id).addEventListener("input", function(e) {
    let rawStr = this.value.replace(/,/g, "").replace(/\D/g, "");
    if (rawStr !== "") {
      this.value = parseInt(rawStr, 10).toLocaleString('en-US');
    } else {
      this.value = "";
    }
    updateLive();
  });
});

document.getElementById("name").addEventListener("input", function() {
  const currentName = this.value.trim().toLowerCase();
  let players = getSafeData();
  const existingPlayer = players.find(x => x.name.toLowerCase() === currentName);
  
  if (existingPlayer) {
    document.getElementById("startingPower").value = existingPlayer.startingPower.toLocaleString('en-US');
    updateLive();
  }
});

function getSafeData() {
  try {
    let data = JSON.parse(localStorage.getItem("guildLog"));
    if (!Array.isArray(data)) { return []; }
    return data;
  } catch (error) {
    return [];
  }
}

function savePlayer() {
  const t = i18n[currentLang];
  const name = document.getElementById("name").value.trim();
  const p = getNum("startingPower");
  const t4 = getNum("t4");
  const t5 = getNum("t5");
  const d = getNum("deads");

  if (!name) return alert(t.alertName);

  const dkp = calcDKP(p, t4, t5, d);
  let players = getSafeData();
  const currentTime = new Date().toLocaleString();

  const data = {
    name, startingPower: p, t4, t5, deads: d, dkp, timestamp: currentTime
  };

  players.unshift(data);
  localStorage.setItem("guildLog", JSON.stringify(players));

  clearInputs();
  displaySavedData();
}

function clearInputs() {
  document.getElementById("t4").value = "";
  document.getElementById("t5").value = "";
  document.getElementById("deads").value = "";
  updateLive(); 
}

function clearPlayerLogs(playerName) {
  const t = i18n[currentLang];
  if (confirm(`${t.confirmDel} ${playerName}?`)) {
    let players = getSafeData();
    players = players.filter(p => p.name.toLowerCase() !== playerName.toLowerCase());
    localStorage.setItem("guildLog", JSON.stringify(players));
    
    const currentInputName = document.getElementById("name").value.trim().toLowerCase();
    if (currentInputName === playerName.toLowerCase()) {
       document.getElementById("startingPower").value = "";
       clearInputs();
    }
    displaySavedData();
  }
}

function displaySavedData() {
  const t = i18n[currentLang];
  let players = getSafeData();
  let html = "";
  
  if (players.length === 0) {
    html = `<span class='small'>${t.noLogs}</span>`;
    document.getElementById("savedDataList").innerHTML = html;
    return;
  }

  const groupedPlayers = {};
  players.forEach(p => {
    const key = p.name.toLowerCase();
    if (!groupedPlayers[key]) {
      groupedPlayers[key] = { displayName: p.name, entries: [] };
    }
    groupedPlayers[key].entries.push(p);
  });

  Object.values(groupedPlayers).forEach(group => {
    const latest = group.entries[0];
    const sp = latest.startingPower || 0;
    const percent = sp > 0 ? ((latest.dkp / sp) * 100).toFixed(2) : "0.00";
    const visualWidth = Math.min(parseFloat(percent), 100);
    
    // Potato Logic Evaluation
    const pValue = parseFloat(percent);
    let potatoText = "";
    if (pValue < 10) {
      potatoText = "Under performing potato";
    } else if (pValue < 50) {
      potatoText = "Safe but do better potato";
    } else if (pValue < 96) {
      potatoText = "Met potato expectations";
    } else if (pValue < 100) {
      potatoText = "ooooo so close potato";
    } else {
      potatoText = "You're an amazing potato!";
    }

    html += `
      <div class="player-card">
        <div class="player-title">👤 ${group.displayName}</div>
        
        <div class="small" style="margin-bottom: 4px;">
          <strong>${t.progress}</strong> ${percent}%
        </div>
        <div class="progress-bg">
          <div class="progress-fill" style="width: ${visualWidth}%;"></div>
          <div class="progress-text">${potatoText}</div>
        </div>
        
        <div class="small" style="margin-bottom: 6px; font-weight: bold;">${t.history}</div>
    `;

    group.entries.forEach(entry => {
      const e_sp = entry.startingPower || 0;
      const e_percent = e_sp > 0 ? ((entry.dkp / e_sp) * 100).toFixed(2) : "0.00";
      const timeString = entry.timestamp ? entry.timestamp : "Unknown";
      
      html += `
        <div class="log-entry">
          <span class="timestamp">${timeString}</span>
          <strong>DKP: ${(entry.dkp||0).toLocaleString()} (${e_percent}%)</strong><br>
          <span class="small">
            T4: ${(entry.t4||0).toLocaleString()} | T5: ${(entry.t5||0).toLocaleString()} | Deads: ${(entry.deads||0).toLocaleString()}
          </span>
        </div>
      `;
    });

    const safeName = group.displayName.replace(/"/g, '&quot;');
    html += `
        <button class="btn-small-danger" data-name="${safeName}" onclick="clearPlayerLogs(this.getAttribute('data-name'))">
          ${t.clearBtn} ${group.displayName}
        </button>
      </div>
    `;
  });
  
  document.getElementById("savedDataList").innerHTML = html;
}

// Initial loads
applyTranslations(); 
displaySavedData();

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
  
</script>

</html>
