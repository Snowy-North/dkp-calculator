<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DKP Tracker</title>

<style>
body {
  font-family: -apple-system, Arial;
  background:#f4f6f8;
  margin:0;
  padding:20px;
}

.container {
  max-width:450px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:16px;
}

input {
  width:100%;
  padding:12px;
  margin:6px 0;
  font-size:16px;
}

.player {
  border-top:1px solid #eee;
  padding:10px 0;
}

.rank {
  font-weight:bold;
}

.gold { color:#d4af37; }
.silver { color:#9aa0a6; }
.bronze { color:#cd7f32; }

.small {
  font-size:13px;
  color:#666;
}

.liveBox {
  margin-top:10px;
  padding:10px;
  background:#f1f5ff;
  border-radius:10px;
  font-weight:bold;
  text-align:center;
}
</style>
</head>

<body>

<div class="container">
<h2>⚡ DKP Tracker</h2>

<input id="name" placeholder="Player name">
<input id="power" type="number" placeholder="Power">
<input id="t4" type="number" placeholder="T4 kills">
<input id="t5" type="number" placeholder="T5 kills">
<input id="deads" type="number" placeholder="Deads">

<div class="liveBox" id="livePreview">
DKP: 0 | DKP %: 0%
</div>

<div id="list"></div>
</div>

<script>

function calcDKP(p, t4, t5, d) {
  return (p * 0.15) + (t4 * 2) + (t5 * 5) + (d * 10);
}

// 🔥 LIVE UPDATE WHILE TYPING
function updateLive() {
  const p = Number(document.getElementById("power").value) || 0;
  const t4 = Number(document.getElementById("t4").value) || 0;
  const t5 = Number(document.getElementById("t5").value) || 0;
  const d = Number(document.getElementById("deads").value) || 0;

  const dkp = calcDKP(p, t4, t5, d);
  const percent = p > 0 ? (dkp / p) * 100 : 0;

  document.getElementById("livePreview").innerText =
    `DKP: ${dkp.toLocaleString()} | DKP %: ${percent.toFixed(2)}%`;
}

// Save player (optional tap by clicking live box)
function savePlayer() {
  const name = document.getElementById("name").value.trim();
  const p = Number(document.getElementById("power").value) || 0;
  const t4 = Number(document.getElementById("t4").value) || 0;
  const t5 = Number(document.getElementById("t5").value) || 0;
  const d = Number(document.getElementById("deads").value) || 0;

  if (!name) return alert("Enter player name");

  const dkp = calcDKP(p, t4, t5, d);

  let players = JSON.parse(localStorage.getItem("players") || "[]");

  const index = players.findIndex(x => x.name === name);

  const data = { name, power: p, t4, t5, deads: d, dkp };

  if (index >= 0) players[index] = data;
  else players.push(data);

  localStorage.setItem("players", JSON.stringify(players));

  render();
}

// leaderboard
function render() {
  let players = JSON.parse(localStorage.getItem("players") || "[]");

  players.sort((a,b) => b.dkp - a.dkp);

  let html = "<h3>🏆 Leaderboard</h3>";

  players.forEach((p, i) => {
    const rank = i + 1;

    let medal = rank === 1 ? "🥇" : rank === 2 ? "🥈" : rank === 3 ? "🥉" : "#" + rank;

    html += `
      <div class="player">
        <div class="rank">${medal} ${p.name}</div>
        <div>DKP: ${p.dkp.toLocaleString()}</div>
        <div class="small">Power: ${p.power}</div>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

// 🔥 attach live updates
["power","t4","t5","deads"].forEach(id => {
  document.getElementById(id).addEventListener("input", updateLive);
});

// optional save on name field change (or you can add a button later)
document.getElementById("name").addEventListener("input", updateLive);

render();

</script>

</body>
</html>
