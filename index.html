<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#007aff">

<!-- iPhone support -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="apple-touch-icon" href="icon-192.pngPNG">
  
<title>1854 DKP System</title>

<style>
body {
  font-family: -apple-system, Arial;
  background:#f4f6f8;
  margin:0;
  padding:20px;
}

.container {
  max-width:500px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:16px;
}

input {
  width:100%;
  padding:12px;
  margin:6px 0;
  font-size:16px;
}

button {
  width:100%;
  padding:12px;
  margin-top:6px;
  background:#007aff;
  color:white;
  border:none;
  border-radius:10px;
}

.player {
  border-top:1px solid #eee;
  padding:10px 0;
}

.rank {
  font-weight:bold;
}

.gold { color:#d4af37; }
.silver { color:#9aa0a6; }
.bronze { color:#cd7f32; }

.small {
  font-size:13px;
  color:#666;
}

.live {
  margin-top:10px;
  padding:10px;
  background:#eef3ff;
  border-radius:10px;
  text-align:center;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
<h2>🏆 1854 DKP System</h2>

<input id="name" placeholder="Player name">
<input id="startingPower" type="number" placeholder="Starting Power">
<input id="t4" type="number" placeholder="T4 kills">
<input id="t5" type="number" placeholder="T5 kills">
<input id="deads" type="number" placeholder="Deads">

<div class="live" id="live">
DKP: 0 | DKP %: 0%
</div>

<button onclick="savePlayer()">Save Player</button>

<div id="list"></div>
</div>

<script>

function calcDKP(p, t4, t5, d) {
  return (p * 0.40) + (t4 * 2) + (t5 * 5) + (d * 10);
}

// LIVE UPDATE
function updateLive() {
  const p = Number(document.getElementById("startingPower").value) || 0;
  const t4 = Number(document.getElementById("t4").value) || 0;
  const t5 = Number(document.getElementById("t5").value) || 0;
  const d = Number(document.getElementById("deads").value) || 0;

  const dkp = calcDKP(p, t4, t5, d);
  const percent = p > 0 ? (dkp / p * 0.40) * 100 : 0;

  document.getElementById("live").innerText =
    `DKP: ${dkp.toLocaleString()} | DKP %: ${percent.toFixed(2)}%`;
}

["startingPower","t4","t5","deads"].forEach(id => {
  document.getElementById(id).addEventListener("input", updateLive);
});

// SAVE OR OVERWRITE
function savePlayer() {
  const name = document.getElementById("name").value.trim();
  const p = Number(document.getElementById("startingPower").value) || 0;
  const t4 = Number(document.getElementById("t4").value) || 0;
  const t5 = Number(document.getElementById("t5").value) || 0;
  const d = Number(document.getElementById("deads").value) || 0;

  if (!name) return alert("Enter player name");

  const dkp = calcDKP(p, t4, t5, d);

  let players = JSON.parse(localStorage.getItem("guild") || "[]");

  const index = players.findIndex(x => x.name.toLowerCase() === name.toLowerCase());

  const data = {
    name,
    startingPower: p,
    t4,
    t5,
    deads: d,
    dkp
  };

  if (index >= 0) {
    players[index] = data;
  } else {
    players.push(data);
  }

  localStorage.setItem("guild", JSON.stringify(players));

  clearInputs();
  render();
}

function clearInputs() {
  document.getElementById("name").value = "";
  document.getElementById("startingPower").value = "";
  document.getElementById("t4").value = "";
  document.getElementById("t5").value = "";
  document.getElementById("deads").value = "";
  updateLive();
}

function tier(dkp) {
  if (dkp >= 100000000) return "🔥 Whale";
  if (dkp >= 50000000) return "Soldier";
  if (dkp >= 20000000) return "Rookie";
  return "Noob";
}

function render() {
  let players = JSON.parse(localStorage.getItem("guild") || "[]");

  players.sort((a,b) => b.dkp - a.dkp);

  let html = "<h3>🏆 Leaderboard</h3>";

  players.forEach((p, i) => {
    const rank = i + 1;

    const medal =
      rank === 1 ? "🥇" :
      rank === 2 ? "🥈" :
      rank === 3 ? "🥉" :
      "#" + rank;

    const percent = p.startingPower > 0
      ? (p.dkp / p.startingPower * 0.40) * 100
      : 0;

    html += `
      <div class="player">
        <div class="rank">${medal} ${p.name} (${tier(p.dkp)})</div>
        <div>DKP: ${p.dkp.toLocaleString()}</div>
        <div>DKP %: ${percent.toFixed(2)}%</div>
        <div class="small">Starting Power: ${p.startingPower}</div>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

render();

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
  
</script>

</body>
</html>
