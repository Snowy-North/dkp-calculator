<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Guild DKP System</title>

<style>
body {
  font-family: -apple-system, Arial;
  background:#f4f6f8;
  margin:0;
  padding:20px;
}

.container {
  max-width:500px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:16px;
}

input {
  width:100%;
  padding:12px;
  margin:6px 0;
  font-size:16px;
}

button {
  width:100%;
  padding:12px;
  margin-top:6px;
  background:#007aff;
  color:white;
  border:none;
  border-radius:10px;
}

.player {
  border-top:1px solid #eee;
  padding:10px 0;
}

.rank { font-weight:bold; }

.gold { color:#d4af37; }
.silver { color:#9aa0a6; }
.bronze { color:#cd7f32; }

.small {
  font-size:13px;
  color:#666;
}

.actions button {
  width:auto;
  margin-right:5px;
  padding:6px 10px;
  font-size:12px;
}

.live {
  margin-top:10px;
  padding:10px;
  background:#eef3ff;
  border-radius:10px;
  text-align:center;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
<h2>🏰 Guild DKP System</h2>

<input id="name" placeholder="Player name">
<input id="power" type="number" placeholder="Power">
<input id="t4" type="number" placeholder="T4 kills">
<input id="t5" type="number" placeholder="T5 kills">
<input id="deads" type="number" placeholder="Deads">

<div class="live" id="live">DKP: 0 | %: 0%</div>

<button onclick="savePlayer()">Save / Update Player</button>

<div id="list"></div>
</div>

<script>

let editIndex = -1;

function calcDKP(p, t4, t5, d) {
  return (p * 0.15) + (t4 * 2) + (t5 * 5) + (d * 10);
}

function tier(dkp) {
  if (dkp >= 100000) return "🔥 Whale";
  if (dkp >= 50000) return "Elite";
  if (dkp >= 20000) return "Veteran";
  return "Rookie";
}

// LIVE UPDATE
function updateLive() {
  const p = +power.value || 0;
  const t4 = +t4.value || 0;
  const t5 = +t5.value || 0;
  const d = +deads.value || 0;

  const dkp = calcDKP(p, t4, t5, d);
  const percent = p ? (dkp / p) * 100 : 0;

  live.innerText = `DKP: ${dkp.toLocaleString()} | %: ${percent.toFixed(2)}%`;
}

["power","t4","t5","deads"].forEach(id => {
  document.getElementById(id).addEventListener("input", updateLive);
});

function savePlayer() {
  const name = document.getElementById("name").value.trim();
  const p = +power.value || 0;
  const t4v = +t4.value || 0;
  const t5v = +t5.value || 0;
  const dv = +deads.value || 0;

  if (!name) return alert("Enter name");

  const dkp = calcDKP(p, t4v, t5v, dv);

  let players = JSON.parse(localStorage.getItem("guild") || "[]");

  const data = {
    name,
    power: p,
    t4: t4v,
    t5: t5v,
    deads: dv,
    dkp
  };

  if (editIndex >= 0) {
    players[editIndex] = data;
    editIndex = -1;
  } else {
    players.push(data);
  }

  localStorage.setItem("guild", JSON.stringify(players));

  clearInputs();
  render();
}

function clearInputs() {
  name.value = "";
  power.value = "";
  t4.value = "";
  t5.value = "";
  deads.value = "";
  updateLive();
}

function editPlayer(i) {
  let players = JSON.parse(localStorage.getItem("guild") || "[]");
  const p = players[i];

  name.value = p.name;
  power.value = p.power;
  t4.value = p.t4;
  t5.value = p.t5;
  deads.value = p.deads;

  editIndex = i;
  updateLive();
}

function deletePlayer(i) {
  let players = JSON.parse(localStorage.getItem("guild") || "[]");
  players.splice(i, 1);
  localStorage.setItem("guild", JSON.stringify(players));
  render();
}

function render() {
  let players = JSON.parse(localStorage.getItem("guild") || "[]");

  players.sort((a,b) => b.dkp - a.dkp);

  let html = "<h3>🏆 Guild Leaderboard</h3>";

  players.forEach((p, i) => {
    let rank = i + 1;
    let medal =
      rank === 1 ? "🥇" :
      rank === 2 ? "🥈" :
      rank === 3 ? "🥉" :
      "#" + rank;

    html += `
      <div class="player">
        <div class="rank">${medal} ${p.name} (${tier(p.dkp)})</div>
        <div>DKP: ${p.dkp.toLocaleString()}</div>
        <div class="small">Power: ${p.power}</div>

        <div class="actions">
          <button onclick="editPlayer(${i})">Edit</button>
          <button onclick="deletePlayer(${i})">Delete</button>
        </div>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

render();

</script>

</body>
</html>
